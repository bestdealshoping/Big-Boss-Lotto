<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapò - Big Boss Lotto</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; color: #333; }
        .nav { background: #1d3557; padding: 10px; display: flex; justify-content: space-around; }
        .nav a { color: white; text-decoration: none; font-size: 14px; font-weight: bold; }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #1d3557; text-align: center; border-bottom: 2px solid #e63946; padding-bottom: 10px; }
        .stats-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 16px; }
        .total-final { font-size: 22px; font-weight: bold; color: #e63946; text-align: center; margin-top: 20px; padding: 15px; background: #fff; border-radius: 8px; border: 2px solid #e63946; }
        .btn-refresh { width: 100%; padding: 12px; background: #2a9d8f; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="nav">
    <a href="vante.html">VANT</a>
    <a href="lis_vante.html">LIS FICH</a>
    <a href="rapo.html">RAPÒ</a>
    <a href="rekiperasyon.html">REKIPERASYON</a>
</div>

<div class="container">
    <div class="card">
        <h2>Rapò Jounen an</h2>
        <button class="btn-refresh" onclick="chajeRapo()">RAFRECHI DONE YO</button>
        <div id="statsTiraj">
            <p style="text-align:center;">Peze bouton an pou chaje done yo...</p>
        </div>
    </div>

    <div id="grandTotal" class="total-final">
        TOTAL JENERAL: 0 HTG
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCtFPW384zZ7JPQnl7hZG3nzA6Z8mdy-2U",
        authDomain: "big-boss-lotto.firebaseapp.com",
        projectId: "big-boss-lotto",
        storageBucket: "big-boss-lotto.firebasestorage.app",
        messagingSenderId: "942815480492",
        appId: "1:942815480492:web:3c56db0495adcb53d22d09"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.chajeRapo = async () => {
        const idVandè = localStorage.getItem("vendeur_id");
        if(!idVandè) return alert("Ou dwe konekte!");

        const lavantRef = ref(db, 'lavant');
        const q = query(lavantRef, orderByChild("vendeur"), equalTo(idVandè));

        try {
            const snapshot = await get(q);
            if (snapshot.exists()) {
                const toutVant = snapshot.val();
                const jodi a = new Date().toLocaleDateString();
                
                let rapòPaTiraj = {};
                let totalJeneral = 0;

                // Filtre pou jwenn lavant jodi a sèlman epi kalkile pa tiraj
                Object.values(toutVant).forEach(fich => {
                    const datFich = new Date(fich.dat).toLocaleDateString();
                    
                    if(datFich === jodi a) {
                        if(!rapòPaTiraj[fich.tiraj]) {
                            rapòPaTiraj[fich.tiraj] = 0;
                        }
                        rapòPaTiraj[fich.tiraj] += fich.total;
                        totalJeneral += fich.total;
                    }
                });

                aficheRapo(rapòPaTiraj, totalJeneral);
            } else {
                document.getElementById('statsTiraj').innerHTML = "<p>Pa gen lavant pou jounen an.</p>";
            }
        } catch (e) {
            console.error(e);
            alert("Erè nan chaje rapò a.");
        }
    };

    function aficheRapo(data, grandTotal) {
        const div = document.getElementById('statsTiraj');
        div.innerHTML = "";
        
        for (const [tiraj, total] of Object.entries(data)) {
            div.innerHTML += `
                <div class="stats-row">
                    <span><strong>${tiraj}</strong></span>
                    <span>${total} HTG</span>
                </div>`;
        }

        document.getElementById('grandTotal').innerText = "TOTAL JENERAL: " + grandTotal + " HTG";
    }

    // Chaje rapò a otomatikman lè paj la louvri
    chajeRapo();
</script>

</body>
</html>
