<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Gestion Vendeurs</title>

<link rel="stylesheet"
href="admin.css">

<script src=
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src=
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body>

<div class="header">




<h2>Gestion vendeurs</h2>

</div>

<div class="sidebar"
id="sidebar">

<a href="dashboard.html">

🏠 Dashboard

</a>

<a href="sellers.html">

👤 Gestion vendeurs

</a>

<a href="tickets.html">

🎫 Tickets vendus

</a>

<a href="settings.html">

⚙️ Paramètres

</a>

</div>

<div class="main">

<h1>Ajouter vendeur</h1>

<div class="form-box">

<input type="text"
id="fullName"
placeholder="Nom complet">

<input type="text"
id="address"
placeholder="Adresse">

<input type="text"
id="phone"
placeholder="Téléphone">

<input type="email"
id="email"
placeholder="Email">

<button onclick="createSeller()">

Ajouter vendeur

</button>

</div>

<table>

<thead>

<tr>

<th>Nom</th>
<th>ID</th>
<th>Code</th>
<th>Action</th>

</tr>

</thead>

<tbody id="sellerTable">

</tbody>

</table>

</div>

<script src="firebase-config.js"></script>

<script src="sellers.js"></script>

<script>

const sidebar =
document.getElementById("sidebar");

document
.getElementById("menuBtn")

.onclick = ()=>{

sidebar.classList.toggle("open");

};

</script>

</body>
</html>
