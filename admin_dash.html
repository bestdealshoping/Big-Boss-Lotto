<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <title>Admin - Big Boss Lotto</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; }
        .sidebar { width: 250px; background: #1d3557; color: white; height: 100vh; position: fixed; padding: 20px; }
        .main { margin-left: 270px; padding: 20px; }
        .sidebar a { color: white; display: block; padding: 10px; text-decoration: none; margin-bottom: 5px; border-radius: 5px; }
        .sidebar a:hover { background: #457b9d; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card h3 { margin: 0; color: #e63946; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Admin Lotto</h2>
    <hr>
    <a href="admin_dash.html">Dashboard</a>
    <a href="admin_jesyon.html">Jesyon Vandè</a>
    <a href="admin_lavant.html">Tout Lavant</a>
</div>

<div class="main">
    <h1>Kontwòl Jeneral</h1>
    <div class="stats-grid">
        <div class="card">
            <h3>Lavant Jodi a</h3>
            <p id="totalJodi">0 HTG</p>
        </div>
        <div class="card">
            <h3>Vandè Aktif</h3>
            <p id="totalVande">0</p>
        </div>
        <div class="card">
            <h3>Fich ki Vann</h3>
            <p id="totalFich">0</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    const firebaseConfig = { /* Sèvi ak menm konfigirasyon ou an */ };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    async function chajeData() {
        const snapLavant = await get(ref(db, 'lavant'));
        const snapVande = await get(ref(db, 'vendeurs'));

        if(snapVande.exists()) {
            document.getElementById('totalVande').innerText = Object.keys(snapVande.val()).length;
        }

        if(snapLavant.exists()) {
            let total = 0;
            const jodi = new Date().toLocaleDateString();
            const lavant = Object.values(snapLavant.val());
            
            lavant.forEach(l => {
                if(new Date(l.dat).toLocaleDateString() === jodi) total += l.total;
            });
            
            document.getElementById('totalJodi').innerText = total + " HTG";
            document.getElementById('totalFich').innerText = lavant.length;
        }
    }
    chajeData();
</script>
</body>
</html>
