<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Boss Lotto | System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="login-page" class="page active">
        <div class="auth-card">
            <h1>BIG BOSS LOTTO</h1>
            <p>Antre idantifyan ou pou konekte</p>
            <form id="login-form">
                <input type="text" id="login-id" placeholder="ID Machin (ex: BB-102)" required>
                <input type="password" id="secret-code" placeholder="Kòd Sekrè" required>
                <button type="submit">KONEKTE</button>
            </form>
        </div>
    </section>

    <section id="vendeur-page" class="page">
        <nav>
            <span id="user-display">Vendeur: --</span>
            <button onclick="logout()">Soti</button>
        </nav>
        
        <div class="menu-tabs">
            <button onclick="showTab('vente')">Vante</button>
            <button onclick="showTab('rapport')">Rapò</button>
        </div>

        <div id="tab-vente" class="tab-content active">
            <div class="sale-container">
                <select id="lotto-state">
                    <option value="Florida">Floride</option>
                    <option value="New York">New York</option>
                    <option value="Georgia">Géorgie</option>
                </select>
                <div class="lotto-types">
                    <button class="type-btn active" data-type="3">Lotto 3</button>
                    <button class="type-btn" data-type="4">Lotto 4</button>
                    <button class="type-btn" data-type="5">Lotto 5</button>
                    <button class="type-btn" data-type="mariage">Mariage</button>
                </div>
                <input type="text" id="lotto-numbers" placeholder="Nimewo yo">
                <input type="number" id="lotto-amount" placeholder="Montant HTG">
                <button id="btn-valider" onclick="processSale()">VALIDER BILLET</button>
                <div id="ticket-preview"></div>
            </div>
        </div>

        <div id="tab-rapport" class="tab-content">
            <h3>Vant Jodi a</h3>
            <div id="sales-list"></div>
        </div>
    </section>

    <script type="module" src="app.js"></script>
</body>
</html>
